# INSTRUCTIONS:
# 1. Go to github.com/ahmed-raza19/ahmed-raza19 (your profile repo)
# 2. Create the folder path: .github/workflows/
# 3. Create a file called snake.yml inside it
# 4. Paste EVERYTHING BELOW this comment block into that file
# 5. Go to the "Actions" tab in your repo
# 6. Click "Generate Snake" workflow on the left
# 7. Click "Run workflow" button
# 8. Wait ~30 seconds, done! Snake will auto-update daily.

name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ahmed-raza19
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
